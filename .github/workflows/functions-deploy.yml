name: Deploy Functions

on:
  push:
    branches: [main]
    paths:
      - "agent-ochuko/functions/**"
      - ".github/workflows/functions-deploy.yml"

jobs:
  deploy:
    name: Deploy Azure Functions
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up Python 3.11 (matches Functions runtime) ─────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install Azure Functions Core Tools ─────────────────────────
      - name: Install Azure Functions Core Tools
        run: |
          npm install -g azure-functions-core-tools@4 --unsafe-perm true

      # ── 4. Log in to Azure ─────────────────────────────────────────────
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── 5. Publish functions (remote build — compiles deps server-side) ─
      - name: Publish to Azure Functions
        working-directory: ./agent-ochuko/functions
        run: |
          func azure functionapp publish agent-ochuko-functions \
            --python \
            --build remote

      # ── 6. Verify all 6 functions are registered ──────────────────────
      - name: Verify function registration
        run: |
          echo "Checking deployed functions..."
          az functionapp function list \
            --name agent-ochuko-functions \
            --resource-group rg-ochuko \
            --query "[].name" \
            --output table
