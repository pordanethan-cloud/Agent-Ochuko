name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "agent-ochuko/backend/**"
      - ".github/workflows/backend-deploy.yml"

jobs:
  deploy:
    name: Build, Push & Deploy FastAPI
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Log in to Docker Hub ────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── 3. Set image tag (Docker Hub username/repo:sha) ───────────────
      - name: Set image tag
        id: tag
        run: |
          echo "IMAGE=${{ secrets.DOCKER_USERNAME }}/agent-ochuko-api:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "IMAGE_LATEST=${{ secrets.DOCKER_USERNAME }}/agent-ochuko-api:latest" >> $GITHUB_OUTPUT

      # ── 4. Build & push Docker image ──────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./agent-ochuko/backend
          file: ./agent-ochuko/backend/Dockerfile
          push: true
          tags: |
            ${{ steps.tag.outputs.IMAGE }}
            ${{ steps.tag.outputs.IMAGE_LATEST }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/agent-ochuko-api:latest
          cache-to: type=inline

      # ── 5. Log in to Azure ─────────────────────────────────────────────
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── 6. Ensure Docker Hub registry is configured on the Container App ─
      - name: Set Docker Hub registry credentials
        run: |
          az containerapp registry set \
            --name agent-ochuko-api \
            --resource-group rg-ochuko \
            --server docker.io \
            --username ${{ secrets.DOCKER_USERNAME }} \
            --password ${{ secrets.DOCKER_PASSWORD }}

      # ── 7. Deploy new image (env vars are set once on the Container App
      #        via az CLI and persist — do not overwrite them here) ────────
      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name agent-ochuko-api \
            --resource-group rg-ochuko \
            --image ${{ steps.tag.outputs.IMAGE }}

      # ── 8. Health check — wait for new revision to be healthy ──────────
      - name: Wait for health check
        run: |
          echo "Waiting 30s for Container App revision to warm up..."
          sleep 30
          # Get Container App FQDN
          FQDN=$(az containerapp show \
            --name agent-ochuko-api \
            --resource-group rg-ochuko \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          echo "Checking health at https://$FQDN/health"
          # Retry up to 5 times
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$FQDN/health")
            if [ "$STATUS" -eq 200 ]; then
              echo "✅ Health check passed (attempt $i)"
              exit 0
            fi
            echo "⏳ Health check returned $STATUS (attempt $i/5) — retrying in 15s..."
            sleep 15
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1
