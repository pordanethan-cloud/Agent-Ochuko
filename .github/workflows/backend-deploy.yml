name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "agent-ochuko/backend/**"
      - ".github/workflows/backend-deploy.yml"

jobs:
  deploy:
    name: Build, Push & Deploy FastAPI
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Log in to Docker Hub ────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── 3. Set image tag (Docker Hub username/repo:sha) ───────────────
      - name: Set image tag
        id: tag
        run: |
          echo "IMAGE=${{ secrets.DOCKER_USERNAME }}/agent-ochuko-api:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "IMAGE_LATEST=${{ secrets.DOCKER_USERNAME }}/agent-ochuko-api:latest" >> $GITHUB_OUTPUT

      # ── 4. Build & push Docker image ──────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./agent-ochuko/backend
          file: ./agent-ochuko/backend/Dockerfile
          push: true
          tags: |
            ${{ steps.tag.outputs.IMAGE }}
            ${{ steps.tag.outputs.IMAGE_LATEST }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/agent-ochuko-api:latest
          cache-to: type=inline

      # ── 5. Log in to Azure ─────────────────────────────────────────────
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── 6. Ensure Docker Hub registry is configured on the Container App ─
      - name: Set Docker Hub registry credentials
        run: |
          az containerapp registry set \
            --name agent-ochuko-api \
            --resource-group rg-ochuko \
            --server docker.io \
            --username ${{ secrets.DOCKER_USERNAME }} \
            --password ${{ secrets.DOCKER_PASSWORD }}

      # ── 7. Deploy new image + set all environment variables ───────────
      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name agent-ochuko-api \
            --resource-group rg-ochuko \
            --image ${{ steps.tag.outputs.IMAGE }} \
            --set-env-vars \
              "ENVIRONMENT=production" \
              "ALLOWED_ORIGINS=https://agentochukostore.z1.web.core.windows.net,https://agentochukoadmin.z1.web.core.windows.net,http://localhost:5173,http://localhost:3000" \
              "AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
              "AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}" \
              "AZURE_OPENAI_API_VERSION=${{ secrets.AZURE_OPENAI_API_VERSION }}" \
              "THINK_MODEL_DEPLOYMENT=${{ secrets.THINK_MODEL_DEPLOYMENT }}" \
              "SOLVE_MODEL_DEPLOYMENT=${{ secrets.SOLVE_MODEL_DEPLOYMENT }}" \
              "NANO_MODEL_DEPLOYMENT=${{ secrets.NANO_MODEL_DEPLOYMENT }}" \
              "COMPACTION_MODEL_DEPLOYMENT=${{ secrets.COMPACTION_MODEL_DEPLOYMENT }}" \
              "AZURE_SPEECH_KEY=${{ secrets.AZURE_SPEECH_KEY }}" \
              "AZURE_SPEECH_REGION=${{ secrets.AZURE_SPEECH_REGION }}" \
              "SPEECH_VOICE_NAME=${{ secrets.SPEECH_VOICE_NAME }}" \
              "GROQ_API_KEYS=${{ secrets.GROQ_API_KEYS }}" \
              "HUGGINGFACE_API_KEYS=${{ secrets.HUGGINGFACE_API_KEYS }}" \
              "HUGGINGFACE_IMAGE_MODEL=${{ secrets.HUGGINGFACE_IMAGE_MODEL }}" \
              "AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT=${{ secrets.AZURE_DOCUMENT_INTELLIGENCE_ENDPOINT }}" \
              "AZURE_DOCUMENT_INTELLIGENCE_KEY=${{ secrets.AZURE_DOCUMENT_INTELLIGENCE_KEY }}" \
              "AZURE_VISION_ENDPOINT=${{ secrets.AZURE_VISION_ENDPOINT }}" \
              "AZURE_VISION_KEY=${{ secrets.AZURE_VISION_KEY }}" \
              "AZURE_STORAGE_ACCOUNT_NAME=${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}" \
              "AZURE_STORAGE_CONNECTION_STRING=${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              "AZURE_QUEUE_NAME=${{ secrets.AZURE_QUEUE_NAME }}" \
              "AZURE_APP_CONFIG_CONNECTION_STRING=${{ secrets.AZURE_APP_CONFIG_CONNECTION_STRING }}" \
              "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" \
              "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" \
              "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
              "SUPABASE_JWT_SECRET=${{ secrets.SUPABASE_JWT_SECRET }}" \
              "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" \
              "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}"

      # ── 8. Health check — wait for new revision to be healthy ──────────
      - name: Wait for health check
        run: |
          echo "Waiting 30s for Container App revision to warm up..."
          sleep 30
          # Get Container App FQDN
          FQDN=$(az containerapp show \
            --name agent-ochuko-api \
            --resource-group rg-ochuko \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          echo "Checking health at https://$FQDN/health"
          # Retry up to 5 times
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://$FQDN/health")
            if [ "$STATUS" -eq 200 ]; then
              echo "✅ Health check passed (attempt $i)"
              exit 0
            fi
            echo "⏳ Health check returned $STATUS (attempt $i/5) — retrying in 15s..."
            sleep 15
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1
